# render.yaml — Render Blueprint configuration for EtherealCRM
services:
  - type: web
    name: etherealcrm
    runtime: python
    buildCommand: pip install -r requirements.txt && python db/migrate.py
    startCommand: gunicorn app:server --bind 0.0.0.0:$PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.10.12
    disk:
      name: etherealcrm-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
